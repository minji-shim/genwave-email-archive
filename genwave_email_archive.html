<title>GenWave 이메일 아카이브</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f5;color:#111}
.wrap{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sb{width:280px;min-width:280px;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;height:100vh}
.sb-hd{padding:16px;border-bottom:1px solid #e5e5e5}
.sb-title{font-size:14px;font-weight:600;color:#111;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sb-title span{font-size:11px;background:#f0f0f0;color:#666;border-radius:20px;padding:2px 8px}
.sb-search{position:relative}
.sb-search input{width:100%;font-size:13px;padding:8px 10px 8px 32px;border-radius:8px;border:1px solid #e0e0e0;background:#fafafa;outline:none}
.sb-search input:focus{border-color:#68FFD9;background:#fff}
.sb-search::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.sb-filters{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #e5e5e5;flex-wrap:wrap}
.ftb{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;transition:all .15s;color:#555}
.ftb.on{background:#0D0E1A;color:#68FFD9;border-color:#68FFD9}
.email-list{flex:1;overflow-y:auto}
.email-item{padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.email-item:hover{background:#fafafa}
.email-item.on{background:#0D0E1A}
.email-item.on .ei-title{color:#68FFD9}
.email-item.on .ei-date,.email-item.on .ei-preview{color:rgba(104,255,217,.5)}
.ei-row{display:flex;justify-content:space-between;gap:6px;margin-bottom:3px}
.ei-title{font-size:12px;font-weight:500;color:#111;line-height:1.4;flex:1}
.ei-date{font-size:10px;color:#999;white-space:nowrap}
.ei-preview{font-size:11px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px}
.tag-u{background:#e8f9f3;color:#2a8a5a;border:1px solid #b8e8d0}
.tag-e{background:#e8f0ff;color:#4060cc;border:1px solid #c0d0f0}
.tag-v{background:#fff8e0;color:#aa7700;border:1px solid #ffe080}
/* Main panel */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;flex-shrink:0}
.tbb{font-size:12px;padding:12px 16px;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tbb.on{color:#111;border-bottom-color:#68FFD9;font-weight:600}
.tbb:hover:not(.on){color:#333;background:#fafafa}
.panel{flex:1;overflow-y:auto;display:none;flex-direction:column}
.panel.show{display:flex}
/* Preview */
.prev-hd{padding:12px 20px;border-bottom:1px solid #e5e5e5;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.prev-title{font-size:14px;font-weight:600;color:#111;margin-bottom:2px}
.prev-info{font-size:11px;color:#777}
.prev-btns{display:flex;gap:6px;flex-shrink:0}
.btn{font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;color:#555;transition:all .15s}
.btn:hover{background:#f5f5f5;border-color:#ccc}
.iframe-wrap{flex:1}
.iframe-wrap iframe{width:100%;height:100%;border:none;min-height:500px}
/* Stats */
.stats-body{padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px}
.stat-label{font-size:11px;color:#999;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:600;color:#111;margin-bottom:2px}
.stat-sub{font-size:11px;color:#888}
.stat-bar{height:3px;background:#eee;border-radius:2px;margin-top:8px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px}
.stats-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.stats-blk{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px}
.blk-title{font-size:12px;font-weight:600;color:#111;margin-bottom:10px}
.link-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:12px;gap:8px}
.link-row:last-child{border-bottom:none}
.link-url{color:#4060cc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px}
.link-cnt{font-weight:600;color:#111;flex-shrink:0}
.dev-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.dev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dev-name{font-size:11px;color:#666;width:60px;flex-shrink:0}
.dev-bar-w{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden}
.dev-bar-f{height:100%;border-radius:3px}
.dev-pct{font-size:11px;font-weight:600;width:38px;text-align:right;flex-shrink:0}
/* Compare */
.cmp-body{padding:20px}
.cmp-section{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:16px}
.cmp-title{font-size:12px;font-weight:600;margin-bottom:12px;color:#111}
.cmp-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid #f5f5f5;cursor:pointer;border-radius:6px}
.cmp-row:last-child{border-bottom:none}
.cmp-row:hover{background:#fafafa}
.cmp-num{font-size:10px;color:#bbb;width:14px;flex-shrink:0}
.cmp-name{font-size:11px;color:#111;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cmp-bw{width:100px;height:6px;background:#eee;border-radius:3px;flex-shrink:0;overflow:hidden}
.cmp-bf{height:100%;border-radius:3px}
.cmp-pct{font-size:11px;font-weight:600;width:46px;text-align:right;flex-shrink:0}
/* Timeline */
.tl-body{padding:20px}
.tl-wrap{position:relative;padding-left:22px}
.tl-line{position:absolute;left:8px;top:10px;bottom:10px;width:2px;background:#e5e5e5;border-radius:2px}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-17px;top:8px;width:10px;height:10px;border-radius:50%;border:2px solid #f5f5f5}
.tl-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.tl-card:hover{border-color:#aaa}
.tl-card.on{border-color:#68FFD9}
.tl-date{font-size:10px;color:#999;margin-bottom:3px}
.tl-t{font-size:12px;font-weight:600;color:#111;line-height:1.4;margin-bottom:5px}
.tl-s{display:flex;gap:12px;font-size:11px;color:#888;margin-top:4px}
.best{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;background:#e8f9f0;color:#2a8a5a;border:1px solid #b8e8d0;margin-left:5px}
</style>

   html:"<html><body><div style='font-family:noto sans kr,Malgun Gothic,arial,sans-serif;max-width:630px;margin:0 auto;background:#F0EAE3'><div style='padding:24px'><h2 style='font-size:20px;font-weight:bold;margin-bottom:16px'>다시 오셨군요 😊</h2><div style='background:#fff;border-radius:8px;padding:20px;margin-bottom:16px'><p style='font-size:14px;margin-bottom:8px'>안녕하세요, GenWave입니다.</p><p style='font-size:14px;margin-bottom:8px'>오랜만입니다 😊<br>GenWave가 <b>정식 오픈</b>하면서 더 쉽고 빠르게 원하는 결과를 만들 수 있도록 새롭게 바뀌었습니다.</p><p style='font-size:14px;font-weight:bold;margin-bottom:6px'>✦ 이런 점이 새로워졌어요</p><p style='font-size:14px;margin-bottom:6px'>이제는 <b>검색 → 선택 → 수정</b>만으로 원하는 결과를 빠르게 만들 수 있습니다.</p><ul style='font-size:14px;margin-left:20px'><li><b>키워드 검색</b>으로 원하는 결과 바로 찾기</li><li><b>마음에 드는 결과를 따라서 만들어보기</b></li><li><b>템플릿 선택 후 바로 생성 — 프롬프트 없이도 OK</b></li><li>이제 <b>모바일</b>에서도 바로 사용 가능</li></ul></div><div style='text-align:center;padding:16px 0'><h2 style='font-size:16px;margin-bottom:4px'>🔥 복귀 감사 이벤트</h2><h3 style='font-size:18px;font-weight:bold;margin-bottom:8px'>🎁 로그인만 하면 30크레딧 즉시 지급!</h3><p style='font-size:14px;margin-bottom:4px'>지금 GenWave에 로그인하시면</p><p style='font-size:14px;margin-bottom:4px'><b>30크레딧</b>을 바로 지급해 드립니다.</p><p style='font-size:14px;margin-bottom:4px'>새로워진 기능을 직접 체험해보세요.</p><p style='font-size:12px;color:#666;margin-bottom:16px'>로그인 즉시 30크레딧이 자동 지급됩니다.</p><a href='https://genwave.ai.kr/login' style='display:inline-block;background:#000;padding:14px 28px;border-radius:500px;text-decoration:none;color:#fff;font-size:16px'>지금 바로 GenWave 열어보기</a></div></div><p style='text-align:center;font-size:12px;color:#999;padding:12px'>다이퀘스트 · mkt@diquest.com · 서울특별시 송파구 올림픽로 35길 123 향군타워 9층</p></div></body></html>"}

var aid=9,atag='all',atab='preview';

function stab(tab,btn){
  atab=tab;
  document.querySelectorAll('.tbb').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  ['tp','ts','tcmp','ttl'].forEach(function(id){document.getElementById(id).style.display='none'});
  var show=tab==='preview'?'tp':tab==='stats'?'ts':tab==='compare'?'tcmp':'ttl';
  document.getElementById(show).style.display='flex';
  if(tab==='stats')rStats();
  else if(tab==='compare')rCmp();
  else if(tab==='timeline')rTl();
}

function rStats(){
  var e=emails.find(function(x){return x.id===aid});
  if(!e)return;
  var s=e.s;
  var maxD=Math.max.apply(null,s.dv.map(function(d){return d.p}));
  var maxOr=Math.max.apply(null,emails.map(function(x){return x.s.or}));
  var maxCr=Math.max.apply(null,emails.map(function(x){return x.s.cr}));
  var html='<p style="font-size:13px;font-weight:600;margin-bottom:14px">발송 성과 <span style="font-size:11px;font-weight:400;color:#999">'+s.at+'</span></p>';
  html+='<div class="stat-grid">';
  html+='<div class="stat-card"><div class="stat-label">발송 성공</div><div class="stat-val">'+s.dr+'%</div><div class="stat-sub">'+s.d.toLocaleString()+'건</div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+s.dr+'%;background:#68FFD9"></div></div></div>';
  html+='<div class="stat-card"><div class="stat-label">오픈율'+(s.or===maxOr?'<span class="best">🏆 최고</span>':'')+'</div><div class="stat-val">'+s.or+'%</div><div class="stat-sub">'+s.o+'명</div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+Math.min(s.or*3,100)+'%;background:#4285F4"></div></div></div>';
  html+='<div class="stat-card"><div class="stat-label">클릭율'+(s.cr===maxCr?'<span class="best">🏆 최고</span>':'')+'</div><div class="stat-val">'+s.cr+'%</div><div class="stat-sub">'+s.c+'명</div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+Math.min(s.cr*30,100)+'%;background:#FBBC04"></div></div></div>';
  html+='<div class="stat-card"><div class="stat-label">수신거부</div><div class="stat-val">'+s.ur+'%</div><div class="stat-sub">'+s.u+'명</div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+Math.min(s.ur*50,100)+'%;background:#EA4335"></div></div></div>';
  html+='</div>';
  html+='<div class="stats-2col">';
  html+='<div><div class="blk-title">클릭 링크 TOP</div><div class="stats-blk">'+s.lk.map(function(l){return '<div class="link-row"><span class="link-url">'+l.u+'</span><span class="link-cnt">'+l.c+'회</span></div>'}).join('')+'</div></div>';
  html+='<div><div class="blk-title">환경별 오픈</div><div class="stats-blk">'+s.dv.map(function(d){return '<div class="dev-row"><span class="dev-dot" style="background:'+d.col+'"></span><span class="dev-name">'+d.n+'</span><div class="dev-bar-w"><div class="dev-bar-f" style="width:'+(d.p/maxD*100).toFixed(0)+'%;background:'+d.col+';opacity:.7"></div></div><span class="dev-pct">'+d.p+'%</span></div>'}).join('')+'</div></div>';
  html+='</div>';
  document.getElementById('scon').innerHTML=html;
}

function rCmp(){
  var maxOr=Math.max.apply(null,emails.map(function(e){return e.s.or}));
  var maxCr=Math.max.apply(null,emails.map(function(e){return e.s.cr}));
  var maxD=Math.max.apply(null,emails.map(function(e){return e.s.d}));
  function rows(getVal,maxVal,color,suffix){
    return emails.map(function(e){
      var v=getVal(e),pct=(v/maxVal*100).toFixed(0);
      var isMax=v===maxVal;
      return '<div class="cmp-row" onclick="sel('+e.id+');stab(\'preview\',document.querySelector(\'.tbb\'))">'+
        '<span class="cmp-num">'+e.id+'</span>'+
        '<span class="cmp-name" title="'+e.subj+'">'+e.subj+'</span>'+
        '<div class="cmp-bw"><div class="cmp-bf" style="width:'+pct+'%;background:'+(isMax?'#68FFD9':color)+'"></div></div>'+
        '<span class="cmp-pct">'+v+suffix+(isMax?' 🏆':'')+'</span></div>';
    }).join('');
  }
  document.getElementById('cmpcon').innerHTML=
    '<div class="cmp-section"><div class="cmp-title">오픈율 비교</div>'+rows(function(e){return e.s.or},maxOr,'#4285F4','%')+'</div>'+
    '<div class="cmp-section"><div class="cmp-title">클릭율 비교</div>'+rows(function(e){return e.s.cr},maxCr,'#FBBC04','%')+'</div>'+
    '<div class="cmp-section"><div class="cmp-title">발송 규모 비교</div>'+rows(function(e){return e.s.d},maxD,'#aaa','')+'</div>';
}

function rTl(){
  var html='<p style="font-size:13px;font-weight:600;margin-bottom:16px">캠페인 타임라인 <span style="font-size:11px;font-weight:400;color:#999">총 '+emails.length+'개</span></p>';
  html+='<div class="tl-wrap"><div class="tl-line"></div>';
  emails.forEach(function(e){
    html+='<div class="tl-item"><div class="tl-dot" style="background:'+e.col+'"></div>'+
      '<div class="tl-card'+(e.id===aid?' on':'')+'" onclick="sel('+e.id+');stab(\'preview\',document.querySelector(\'.tbb\'))">'+
      '<div class="tl-date">'+e.date+'</div>'+
      '<div class="tl-t">'+e.subj+'</div>'+
      '<span class="tag '+e.tc+'">'+e.tl+'</span>'+
      '<div class="tl-s"><span>📨 '+e.s.d.toLocaleString()+'</span><span>👁 '+e.s.or+'%</span><span>🖱 '+e.s.cr+'%</span></div>'+
      '</div></div>';
  });
  html+='</div>';
  document.getElementById('tlcon').innerHTML=html;
}

function rList(){
  var q=document.getElementById('q').value.toLowerCase();
  var f=emails.filter(function(e){
    return(atag==='all'||e.tag===atag)&&(!q||e.subj.toLowerCase().indexOf(q)>-1||e.prev.toLowerCase().indexOf(q)>-1);
  });
  document.getElementById('cnt').textContent=f.length;
  document.getElementById('elist').innerHTML=f.map(function(e){
    return '<div class="email-item'+(e.id===aid?' on':'')+'" onclick="sel('+e.id+')">'+
      '<div class="ei-row"><div class="ei-title">'+e.subj+'</div><div class="ei-date">'+e.date+'</div></div>'+
      '<div class="ei-preview">'+e.prev+'</div>'+
      '<span class="tag '+e.tc+'">'+e.tl+'</span></div>';
  }).join('');
}

function sel(id){
  aid=id;
  var e=emails.find(function(x){return x.id===id});
  if(!e)return;
  document.getElementById('psubj').textContent=e.subj;
  document.getElementById('pinfo').textContent=e.date+' · 발송 '+e.s.d.toLocaleString()+'건 · 오픈율 '+e.s.or+'%';
  var iframe=document.getElementById('eif');
  var doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();doc.write(e.html);doc.close();
  if(atab==='stats')rStats();
  if(atab==='compare')rCmp();
  if(atab==='timeline')rTl();
  rList();
}

function setTag(btn){
  atag=btn.dataset.tag;
  document.querySelectorAll('.ftb').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  rList();
}

function cpHtml(){
  var e=emails.find(function(x){return x.id===aid});
  if(!e)return;
  navigator.clipboard.writeText(e.html).then(function(){
    var b=document.getElementById('cpbtn'),o=b.textContent;
    b.textContent='✅ 복사됨!';
    setTimeout(function(){b.textContent=o},1500);
  });
}

function dlHtml(){
  var e=emails.find(function(x){return x.id===aid});
  if(!e)return;
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([e.html],{type:'text/html'}));
  a.download=e.date+'_'+e.subj.substring(0,30)+'.html';
  a.click();
}

rList();sel(6);
</script>
</body>
</html>
